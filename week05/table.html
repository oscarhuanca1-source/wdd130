<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="styles/table.css">
</head>

<body>
    <table>
        <thead>
            <th>League</th>
            <th>Team</th>
            <th>Record</th>
            <th>Player Count</th>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Southern</td>
                <td>Parana</td>
                <td>52 - 19</td>
                <td>23</td>
            </tr>
            <tr>
                <td class="fondo">Catarina</td>
                <td class="fondo">49 - 24</td>
                <td class="fondo">10</td>
            </tr>
            <tr>
                <td rowspan="3">Western</td>
                <td>Lacerda</td>
                <td>92 - 70</td>
                <td>27</td>
            </tr>
            <tr>
                <td class="fondo">Acre</td>
                <td class="fondo">75 - 87</td>
                <td class="fondo">20</td>
            </tr>
            <tr>
                <td>Rondonia</td>
                <td>10 - 7</td>
                <td>12</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Total Players</td>
                <td>92</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
