<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="White Water Rafting, Come and relax for a weekend, enjoy a pastime with your family. I assure you it will be an experience you will never forget.">
    <meta name="author" content="Oscar Huanca">
    <title>Contact Us and the rafting company name</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rapids_logo.png" alt="The Rapids Logo">
        <nav>
            <a href="index.html" class="1">Home</a>
            <a href="about.html" class="2">About Us</a>
            <a href="trips.html" class="3">Trips</a>
            <a href="contact.html" class="4">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero-contact">
            <article>
                <h1>The Rapids Company</h1>
                <p>Urb. La Alborada Q-11</p>
                <p>Pisco, Ica</p>
                <p>+51 944 976 904</p>
                <p>info@therapids.com</p>
            </article>
        </div>

        <section class="user">
            <div class="user1">
                <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d921.097925701
                  3192!2d-76.21347244937336!3d-13.707427067620262!2m3!1f0!2f0!3f0!3m2!1i10
                  24!2i768!4f13.1!3m2!1m1!2zMTPCsDQyJzI0LjciUyA3NsKwMTInNDguNiJX!5e1!3m2!1
                  ses!2sus!4v1775509729746!5m2!1ses!2sus" width="400" height="400"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form class="user2">
                <div class="name">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Insert your Name"
                      required>
                </div>

                <div class="email">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Insert your Email"
                      required>
                </div>

                <div class="radio">
                    <label class="radio1">Message Purpose</label>
                    <label><input type="radio" name="radio" id="radio"> General Inquiry</label>
                    <label><input type="radio" name="radio" id="radio"> Reservation Question</label>
                    <label><input type="radio" name="radio" id="radio"> Website Suggestion</label>
                </div>
               
                <div class="message">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Type here"></textarea>
                </div>

                <div class="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                <input type="checkbox" id="subscribe" name="subscribe">
                </div>

                <div class="submit">
                <button type="submit">Get in Touch!</button>
                </div>
            </form>
        </section>

        <section class="employee">
            <h2>We Are Here to Serve You</h2>
            <figure class="img_employee">
                <img src="images/ceo-robert-smith.jpg" alt="CEO Robert Smith">
                <figcaption>CEO Robert Smith</figcaption>
            </figure>
            <figure class="img_employee">
                <img src="images/manager-emma-watson.jpg" alt="Manager Emma Watson">
                <figcaption>Manager Emma Watson</figcaption>
            </figure>
            <figure class="img_employee">
                <img src="images/instructor-kevin-james.jpg" alt="Instructor Kevin James">
                <figcaption>Instructor Kevin James</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <nav class="socialmedia">
            <p>© (2026) 💦 The Rapids 💦 Oscar Huanca</p>
            <div class="socialweb">
                <a href="https://www.facebook.com/oscar.alejandro.598263"><img
                      src="images/facebook.svg" alt="Facebook Icon"></a>
                <a href="https://www.linkedin.com/in/oscar-alejandro-huanca-maldonado-439781163/"><img
                      src="images/linkedin.svg" alt="LinkedIn Icon"></a>
                <a href="https://www.instagram.com/oscar_huanca_maldonado/"><img
                      src="images/instagram.svg" alt="Instagram Icon"></a>
            </div>
        </nav>
    </footer>
</body>

</html>
